version: "3.9"
services:
  postgres:
    image: postgres:16
    container_name: polyalpha-postgres
    environment:
      POSTGRES_DB: polyalpha
      POSTGRES_USER: polyalpha
      POSTGRES_PASSWORD: polyalpha
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
